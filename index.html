<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro YT Downloader | Harshit Papa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #ef4444; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-2xl p-6 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-600 mb-2"><i class="fab fa-youtube"></i> Pro Downloader</h1>
            <p class="text-gray-500 italic">Harshit Papa Edition - Fast & Direct</p>
        </div>

        <div class="flex flex-col md:flex-row gap-3 mb-8">
            <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." 
                class="flex-1 p-4 border-2 border-gray-200 rounded-xl focus:border-red-500 outline-none transition-all">
            <button onclick="fetchVideo()" id="btnText" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-xl transition-all shadow-lg active:scale-95">
                Fetch Links
            </button>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mx-auto mb-4"></div>
            <p class="text-red-600 font-semibold italic animate-pulse">Fetching original file data from server...</p>
        </div>

        <div id="result" class="hidden animate-in fade-in duration-500">
            <div class="bg-gray-50 rounded-xl p-4 mb-6 flex items-start gap-4 border border-gray-200">
                <img id="vThumb" class="w-32 rounded-lg shadow-md" src="" alt="">
                <div>
                    <h3 id="vTitle" class="font-bold text-gray-800 text-sm md:text-base line-clamp-2"></h3>
                    <p id="vAuthor" class="text-red-600 text-xs mt-1 font-bold"></p>
                    <p id="vDuration" class="text-gray-400 text-[10px] mt-1"></p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-sm font-bold text-gray-700 mb-2">Select Video Quality:</label>
                <div class="grid grid-cols-2 gap-3" id="qualityList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const btnText = document.getElementById('btnText');

            if (!url) { alert("Harshit Papa, link toh paste kijiye!"); return; }

            loading.classList.remove('hidden');
            result.classList.add('hidden');
            btnText.disabled = true;

            try {
                // 1. Fetch Metadata (oEmbed)
                const metaRes = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
                const meta = await metaRes.json();
                
                if (meta.error) throw new Error("Invalid Link");

                document.getElementById('vThumb').src = meta.thumbnail_url;
                document.getElementById('vTitle').innerText = meta.title;
                document.getElementById('vAuthor').innerText = meta.author_name;

                // 2. Setup Quality Options
                const qList = document.getElementById('qualityList');
                qList.innerHTML = "";
                
                const qualities = [
                    { label: "Full HD (1080p)", val: "1080", icon: "fas fa-star" },
                    { label: "HD (720p)", val: "720", icon: "fas fa-check-circle" },
                    { label: "SD (480p)", val: "480", icon: "fas fa-play" },
                    { label: "MP3 Audio", val: "mp3", icon: "fas fa-music" }
                ];

                qualities.forEach(q => {
                    const btn = document.createElement('button');
                    btn.className = "flex items-center justify-center gap-2 bg-white border-2 border-gray-100 hover:border-red-500 hover:bg-red-50 text-gray-700 p-3 rounded-xl transition-all font-semibold text-sm shadow-sm";
                    btn.innerHTML = `<i class="${q.icon} text-red-500"></i> ${q.label}`;
                    btn.onclick = () => triggerDownload(url, q.val);
                    qList.appendChild(btn);
                });

                loading.classList.add('hidden');
                result.classList.remove('hidden');
            } catch (err) {
                alert("Server error! Please check the link or try after 1 minute.");
                console.error(err);
            } finally {
                btnText.disabled = false;
            }
        }

        async function triggerDownload(videoUrl, quality) {
            alert("Harshit Papa, processing start ho rahi hai. Please wait for the download popup...");
            
            try {
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({
                        url: videoUrl,
                        videoQuality: quality,
                        downloadMode: quality === 'mp3' ? 'audio' : 'video'
                    })
                });

                const data = await response.json();
                if (data.url) {
                    window.location.href = data.url; // This will trigger direct download
                } else {
                    alert("Ye quality filhal available nahi hai.");
                }
            } catch (e) {
                alert("API Limit reached! Please try again in 5 seconds.");
            }
        }
    </script>
</body>
</html>
