<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro YT Downloader | Harshit Papa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #ef4444; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-loading { pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-2xl p-6 md:p-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-red-600 mb-2"><i class="fab fa-youtube"></i> Pro Downloader</h1>
            <p class="text-gray-500 italic">Harshit Papa Edition - Stable & Fast</p>
        </div>

        <div class="flex flex-col md:flex-row gap-3 mb-8">
            <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." 
                class="flex-1 p-4 border-2 border-gray-200 rounded-xl focus:border-red-500 outline-none transition-all">
            <button onclick="fetchVideo()" id="fetchBtn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded-xl transition-all shadow-lg active:scale-95">
                Fetch Links
            </button>
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="loader w-12 h-12 border-4 border-gray-200 rounded-full mx-auto mb-4"></div>
            <p class="text-red-600 font-semibold italic animate-pulse">Fetching video details...</p>
        </div>

        <div id="result" class="hidden animate-in fade-in duration-500">
            <div class="bg-gray-50 rounded-xl p-4 mb-6 flex items-start gap-4 border border-gray-200">
                <img id="vThumb" class="w-32 rounded-lg shadow-md" src="" alt="thumbnail">
                <div class="overflow-hidden">
                    <h3 id="vTitle" class="font-bold text-gray-800 text-sm md:text-base truncate"></h3>
                    <p id="vAuthor" class="text-red-600 text-xs mt-1 font-bold"></p>
                    <p id="vStatus" class="text-green-600 text-[10px] mt-1 font-semibold uppercase tracking-wider">Status: Ready</p>
                </div>
            </div>

            <div class="space-y-3">
                <label class="block text-sm font-bold text-gray-700 mb-2">Select Format & Quality:</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="qualityList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const fetchBtn = document.getElementById('fetchBtn');

            if (!url || !url.includes('youtu')) { 
                alert("Harshit Papa, kripya sahi YouTube link paste karein!"); 
                return; 
            }

            loading.classList.remove('hidden');
            result.classList.add('hidden');
            fetchBtn.classList.add('btn-loading');

            try {
                // Fetch Metadata using noEmbed
                const metaRes = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
                const meta = await metaRes.json();
                
                if (meta.error) throw new Error("Invalid URL");

                document.getElementById('vThumb').src = meta.thumbnail_url;
                document.getElementById('vTitle').innerText = meta.title;
                document.getElementById('vAuthor').innerText = meta.author_name;

                const qList = document.getElementById('qualityList');
                qList.innerHTML = "";
                
                const options = [
                    { label: "Video 1080p", val: "1080", icon: "fas fa-film" },
                    { label: "Video 720p", val: "720", icon: "fas fa-check-circle" },
                    { label: "Video 480p", val: "480", icon: "fas fa-play" },
                    { label: "Audio MP3", val: "mp3", icon: "fas fa-music" }
                ];

                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "flex items-center justify-between bg-white border-2 border-gray-100 hover:border-red-500 hover:bg-red-50 text-gray-700 p-3 px-4 rounded-xl transition-all font-semibold text-sm shadow-sm group";
                    btn.innerHTML = `<span><i class="${opt.icon} text-red-500 mr-2"></i> ${opt.label}</span> <i class="fas fa-download opacity-0 group-hover:opacity-100 transition-opacity"></i>`;
                    btn.onclick = (e) => triggerDownload(e.currentTarget, url, opt.val);
                    qList.appendChild(btn);
                });

                loading.classList.add('hidden');
                result.classList.remove('hidden');
            } catch (err) {
                alert("Video fetch nahi ho payi. Link check karein.");
            } finally {
                fetchBtn.classList.remove('btn-loading');
            }
        }

        async function triggerDownload(btn, videoUrl, quality) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Processing...`;
            btn.classList.add('btn-loading');
            btn.classList.replace('border-gray-100', 'border-red-500');

            try {
                // Primary Method: Cobalt API
                const response = await fetch("https://api.cobalt.tools/api/json", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Accept": "application/json" },
                    body: JSON.stringify({
                        url: videoUrl,
                        videoQuality: quality,
                        downloadMode: quality === 'mp3' ? 'audio' : 'video',
                        filenameStyle: 'pretty'
                    })
                });

                const data = await response.json();
                
                if (data.url) {
                    // Direct Download Trigger
                    const link = document.createElement('a');
                    link.href = data.url;
                    link.download = '';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } else {
                    throw new Error("Switch to fallback");
                }
            } catch (e) {
                console.log("Cobalt failed, using fallback...");
                // Fallback Method: Opens a secure downloader tab
                const fallbackUrl = `https://loader.to/api/button/?url=${encodeURIComponent(videoUrl)}&f=${quality}`;
                window.open(fallbackUrl, '_blank');
            } finally {
                btn.innerHTML = originalHTML;
                btn.classList.remove('btn-loading');
                btn.classList.replace('border-red-500', 'border-gray-100');
            }
        }
    </script>
</body>
</html>
